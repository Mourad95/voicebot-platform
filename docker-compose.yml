networks:
  voicebot:
    driver: bridge

services:
  mongo:
    image: mongo:latest
    restart: always
    container_name: voicebot-mongo
    networks:
      - voicebot
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    container_name: voicebot-app
    networks:
      - voicebot
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/voicebot?authSource=admin
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongodb_data:
    driver: local
